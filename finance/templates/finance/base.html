<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>{% block title %}{% endblock title %}</title>
</head>
<body class="bg-gray-100">

    <nav class="bg-indigo-500 p-4 text-white">

        {% if user.is_authenticated %}
            <a href="{% url "transaction_add" %}" class="mx-4">Add Transaction</a>
            <a href="{% url "transaction_list" %}" class="mx-4">View Transactions</a>
            <a href="{% url "goal_add" %}" class="mx-4">Add Goal</a>
            <a href="{% url "dashboard" %}" class="mx-4">Dashboard</a>
            <form id="logout-form" action="{% url 'logout' %}" method="POST" style="display: inline;">
                {% csrf_token %}
                <a href="#" onclick="document.getElementById('logout-form').submit();" class="ml-4">
                    Logout
                </a>
            </form>

        {% else %}

            <a href="{% url 'login' %}" class="ml-4">Login</a>
            <a href="{% url 'register' %}" class="ml-4">Register</a>

        {% endif %}

    </nav>

    {% if messages %}
    <div class="px-4 mt-4 absolute z-50">
        {% for message in messages %}
            <div class="bg-[#7e22ce] text-white p-3 rounded-md shadow-md mb-2">
                Message: {{ message }}
            </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}
    {% endblock content %}

</body>
</html>
